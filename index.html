<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
    <style>
      body{
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
      }
      .doll{
        height: 300px;
        width: 300px;
        background-color: burlywood;
        border-radius: 100%;
        position: relative;
        
      }
      .child:nth-child(1){
          height: 150px;
          width: 80px;
          background-color: rgb(240, 186, 186);
          left: 10px;
        position: absolute;
        transform: rotate(-30deg);
        animation: ear1 1s linear infinite alternate;
         border-top-left-radius: 30px;
        border-top-right-radius: 30px;
             border-bottom-left-radius: 50%;
             z-index: 2;
      }
       .child:nth-child(2){
         height: 150px;
          width: 80px;
          background-color: rgb(240, 186, 186);
          position: absolute;
          right: 10px;
          top: 0px;
        transform: rotate(30deg);
        animation: ear2 1s linear infinite alternate;
        border-top-left-radius: 30px;
        border-top-right-radius: 30px;
        border-bottom-right-radius: 50%;
        z-index: 2;

      }
       .child:nth-child(3){
        height: 30px;
        width: 60px;
        background-color: brown;
        position: absolute;
        top: 60%;
        left: 40%;
        border-radius: 20px;
      }

      .eye1{
          height: 30px;
        width: 30px;
        border-radius: 100%;
        background-color: black;
         position: absolute;
         top: 100px;
         left: 70px;
         z-index: 1;
      }

   
      .eye2{
         height: 30px;
        width: 30px;
        border-radius: 100%;
        background-color: black;
        position: absolute;
        top: 100px;
         right: 70px;

      }

      h3{
        animation: bhuvana 1s linear infinite alternate;
      }
      @keyframes bhuvana {
          from{
          transform: translateY(20px) ;
            z-index: -1;
        }
        to{
           transform: translateY(-50px);
           z-index: -1;
        }
      }

      @keyframes ear1 {
        from{
          transform: rotateZ(50deg);
        }
        to{
           transform: rotateZ(-50deg);
        }
        
      }
       @keyframes ear2 {
        from{
          transform: rotateZ(-50deg);
        }
        to{
           transform: rotateZ(50deg);
        }
        
      }
    </style>
  </head>
<body>

<div class="doll">


  <div class="child"></div>
  <div class="child"></div>
  <div class="child"></div>
  <div class="eye1">1</div>
  <div class="eye2"></div>


</div>

<h3>Hi Bhuvana</h3>


</body>

</html>
